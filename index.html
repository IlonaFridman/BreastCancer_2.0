<style id="font-toggle-css">
  .font-toggle-wrap{display:inline-flex;align-items:center;gap:3px;background:#fff;border:1.5px solid #b5d4f4;border-radius:8px;padding:3px 7px;margin-right:8px;}
  .font-toggle-label{font-size:11px;color:#888780;margin-right:2px;}
  .ft-btn{background:none;border:none;cursor:pointer;padding:2px 6px;border-radius:5px;font-family:Arial,sans-serif;font-weight:700;color:#888780;line-height:1;}
  .ft-btn.active{background:#e6f1fb;color:#185FA5;}
  .ft-btn:hover{background:#f0f7ff;}
  body.font-large p,body.font-large li,body.font-large label,body.font-large .lede-panel,body.font-large .card-desc,body.font-large .section-content,body.font-large h2.slide-title{font-size:20px!important;line-height:1.8!important;}
  body.font-large h1,body.font-large h1.slide-title{font-size:2.6rem!important;}
  body.font-large .acc-header,.font-large .acc-panel,.font-large .q-list li,.font-large .q-list label{font-size:19px!important;}
  body.font-large .step-text,.font-large .bc-simple-instr,.font-large ul li{font-size:19px!important;line-height:1.85!important;}
</style>
<script id="font-toggle-js">
(function(){
  var LARGE_KEY = 'bc_font_large';
  function applyFont(large){
    document.body.classList.toggle('font-large', large);
    document.querySelectorAll('.ft-btn').forEach(function(b){
      b.classList.toggle('active', large ? b.dataset.size==='large' : b.dataset.size==='normal');
    });
    try{ localStorage.setItem(LARGE_KEY, large?'1':'0'); }catch(e){}
  }
  var saved;
  try{ saved = localStorage.getItem(LARGE_KEY); }catch(e){}
  var isLarge = saved === '1';
  window.addEventListener('DOMContentLoaded', function(){
    applyFont(isLarge);
    document.querySelectorAll('.ft-btn').forEach(function(b){
      b.addEventListener('click', function(){ applyFont(b.dataset.size==='large'); });
    });
  });
})();
</script>
</body>
